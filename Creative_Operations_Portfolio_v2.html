<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Operations — Portfolio Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#09090f;--s1:#111118;--s2:#18181f;--s3:#1f1f28;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#eeeae3;--muted:#6e6e82;--muted2:#9a9ab0;
  --gold:#c8a46a;--gold2:#e4cfa0;

  /* Health colors */
  --at-risk:#ff4d4d;
  --at-risk-bg:rgba(255,77,77,0.12);
  --slipping:#f5a623;
  --slipping-bg:rgba(245,166,35,0.12);
  --on-track:#3ecf8e;
  --on-track-bg:rgba(62,207,142,0.12);
  --ahead:#4a9eff;
  --ahead-bg:rgba(74,158,255,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}

/* NAV */
nav{display:flex;align-items:center;padding:0 48px;height:60px;border-bottom:1px solid var(--border);background:var(--s1);position:sticky;top:0;z-index:100;gap:0;}
.nav-brand{font-family:"Playfair Display",serif;font-size:15px;color:var(--gold);letter-spacing:.05em;margin-right:24px;white-space:nowrap;}
.nav-tabs{display:flex;gap:2px;flex:1;}
.nav-tab{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;background:none;border:none;font-family:"DM Sans",sans-serif;transition:all .15s;}
.nav-tab:hover{color:var(--text);background:var(--s3);}
.nav-tab.active{color:var(--gold);background:rgba(200,164,106,.1);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:20px;}
.nav-today{font-size:11px;color:var(--muted);white-space:nowrap;}
.nav-today span{color:var(--gold2);}
.health-mini{display:flex;gap:6px;align-items:center;}
.hm-pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;cursor:pointer;transition:opacity .15s;}
.hm-pill:hover{opacity:.8;}

main{padding:36px 48px;max-width:1700px;}
.view{display:none;}.view.active{display:block;}

/* ── HEALTH BADGES ── */
.hbadge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.04em;white-space:nowrap;}
.hbadge::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.hbadge.at-risk{background:var(--at-risk-bg);color:var(--at-risk);}
.hbadge.at-risk::before{background:var(--at-risk);}
.hbadge.slipping{background:var(--slipping-bg);color:var(--slipping);}
.hbadge.slipping::before{background:var(--slipping);}
.hbadge.on-track{background:var(--on-track-bg);color:var(--on-track);}
.hbadge.on-track::before{background:var(--on-track);}
.hbadge.ahead{background:var(--ahead-bg);color:var(--ahead);}
.hbadge.ahead::before{background:var(--ahead);}

.hbadge-label{font-size:10px;font-weight:600;letter-spacing:.04em;}

/* ── STATUS VIEW ── */
.status-header{margin-bottom:32px;}
.status-header h2{font-family:"Playfair Display",serif;font-size:28px;font-weight:600;margin-bottom:6px;}
.status-header p{color:var(--muted);font-size:13px;}

.health-summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:36px;}
.hsb-card{border-radius:12px;padding:20px 22px;border:1px solid;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.hsb-card:hover{transform:translateY(-2px);}
.hsb-card.at-risk{background:var(--at-risk-bg);border-color:rgba(255,77,77,.25);}
.hsb-card.slipping{background:var(--slipping-bg);border-color:rgba(245,166,35,.25);}
.hsb-card.on-track{background:var(--on-track-bg);border-color:rgba(62,207,142,.25);}
.hsb-card.ahead{background:var(--ahead-bg);border-color:rgba(74,158,255,.25);}
.hsb-num{font-family:"Playfair Display",serif;font-size:48px;font-weight:700;line-height:1;}
.hsb-card.at-risk .hsb-num{color:var(--at-risk);}
.hsb-card.slipping .hsb-num{color:var(--slipping);}
.hsb-card.on-track .hsb-num{color:var(--on-track);}
.hsb-card.ahead .hsb-num{color:var(--ahead);}
.hsb-label{font-size:13px;font-weight:600;margin-top:4px;}
.hsb-card.at-risk .hsb-label{color:var(--at-risk);}
.hsb-card.slipping .hsb-label{color:var(--slipping);}
.hsb-card.on-track .hsb-label{color:var(--on-track);}
.hsb-card.ahead .hsb-label{color:var(--ahead);}
.hsb-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.hsb-icon{position:absolute;right:20px;top:16px;font-size:28px;opacity:.25;}

.status-section{margin-bottom:36px;}
.status-section-title{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.status-section-title h3{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;}

.status-project-row{background:var(--s1);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;transition:all .2s;}
.status-project-row:hover{border-color:var(--border2);}
.spr-header{display:grid;grid-template-columns:2fr 1fr 1.5fr 2fr;gap:16px;padding:16px 20px;cursor:pointer;align-items:center;}
.spr-name{font-size:13px;font-weight:500;}
.spr-workflow{font-size:11px;color:var(--muted);}
.spr-note{font-size:11px;color:var(--muted2);line-height:1.5;}
.spr-expand{font-size:10px;color:var(--muted);text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:6px;}

.spr-steps{display:none;border-top:1px solid var(--border);padding:12px 20px 16px;}
.spr-steps.open{display:block;}
.spr-steps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;margin-top:10px;}
.step-chip{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;flex-direction:column;gap:4px;}
.step-chip-id{font-size:10px;font-weight:600;}
.step-chip-name{font-size:11px;color:var(--text);line-height:1.4;}
.step-chip-date{font-size:10px;color:var(--muted);}
.step-chip.at-risk{border-left:3px solid var(--at-risk);}
.step-chip.slipping{border-left:3px solid var(--slipping);}
.step-chip.on-track{border-left:3px solid var(--on-track);}
.step-chip.ahead{border-left:3px solid var(--ahead);}

/* ── PORTFOLIO VIEW ── */
.portfolio-header{display:flex;align-items:baseline;gap:16px;margin-bottom:28px;}
.portfolio-header h2{font-family:"Playfair Display",serif;font-size:28px;font-weight:600;}
.portfolio-header p{color:var(--muted);font-size:13px;}
.portfolio-filters{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.pf-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--s2);color:var(--muted);font-size:11px;font-family:"DM Sans",sans-serif;cursor:pointer;transition:all .15s;letter-spacing:.05em;}
.pf-btn:hover{border-color:var(--gold);color:var(--gold);}
.pf-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:600;}
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
.project-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:22px 24px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.project-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.4);}
.project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;}
.project-card.at-risk::before{background:var(--at-risk);}
.project-card.slipping::before{background:var(--slipping);}
.project-card.on-track::before{background:var(--on-track);}
.project-card.ahead::before{background:var(--ahead);}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.pc-name{font-size:14px;font-weight:500;color:var(--text);line-height:1.3;flex:1;margin-right:12px;}
.pc-workflow{font-size:11px;color:var(--muted);margin-bottom:10px;}
.pc-health-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.pc-status-small{font-size:10px;padding:2px 8px;border-radius:8px;background:var(--s3);color:var(--muted2);}
.pc-bar-wrap{margin-bottom:12px;}
.pc-bar-label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:5px;}
.pc-bar{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;}
.pc-bar-fill{height:100%;border-radius:3px;}
.pc-stats{display:flex;gap:12px;margin-bottom:12px;}
.pc-stat{text-align:center;}
.pc-stat-num{font-size:16px;font-weight:600;font-family:"Playfair Display",serif;line-height:1;}
.pc-stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:2px;}
.pc-dates{font-size:10px;color:var(--muted);margin-bottom:10px;}
.pc-next{font-size:10px;color:var(--muted);line-height:1.7;border-top:1px solid var(--border);padding-top:10px;}
.pc-next strong{color:var(--gold2);font-weight:500;}
.pc-health-note{font-size:10px;color:var(--muted2);line-height:1.6;border-top:1px solid var(--border);padding-top:10px;margin-top:4px;}
.needs-dates-warning{display:inline-block;font-size:10px;color:var(--slipping);background:var(--slipping-bg);padding:2px 8px;border-radius:8px;margin-bottom:8px;}

/* THIS WEEK */
.week-header{margin-bottom:28px;}
.week-header h2{font-family:"Playfair Display",serif;font-size:28px;font-weight:600;margin-bottom:6px;}
.week-header p{color:var(--muted);font-size:13px;}
.week-group{margin-bottom:28px;}
.week-group-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.week-group-badge{font-size:10px;padding:2px 8px;border-radius:8px;background:var(--s2);color:var(--muted2);}
.week-item{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:13px 18px;margin-bottom:8px;display:grid;grid-template-columns:3fr 1.5fr 1fr 1fr 1fr;gap:12px;align-items:center;transition:background .15s;cursor:pointer;}
.week-item:hover{background:var(--s2);}
.wi-name{font-size:12px;color:var(--text);}
.wi-step{font-size:10px;color:var(--muted);margin-top:2px;}
.wi-phase{font-size:10px;color:var(--muted2);}
.wi-date{font-size:11px;color:var(--muted2);}
.wi-status{font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;text-align:center;}
.wi-status.in-progress{background:rgba(74,158,255,.15);color:#4a9eff;}
.wi-status.upcoming{background:rgba(167,139,250,.15);color:#a78bfa;}

/* TIMELINE */
.tl-controls{display:flex;gap:10px;margin-bottom:20px;align-items:center;flex-wrap:wrap;}
.tl-controls .filter-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.tf-btn{padding:5px 14px;border-radius:16px;border:1px solid var(--border);background:var(--s2);color:var(--muted);font-size:11px;font-family:"DM Sans",sans-serif;cursor:pointer;transition:all .15s;}
.tf-btn:hover{border-color:var(--gold);color:var(--gold);}
.tf-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:600;}
.tl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:var(--s1);}
.tl-inner{min-width:1400px;}
.tl-project-row{display:grid;border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer;}
.tl-project-row:hover{background:rgba(255,255,255,.02);}
.tl-project-row:last-child{border-bottom:none;}
.tl-label{padding:12px 18px;font-size:11px;border-right:1px solid var(--border);display:flex;align-items:center;gap:8px;min-height:48px;}
.tl-bar-area{padding:8px 12px;position:relative;display:flex;align-items:center;min-height:48px;}
.tl-bar{height:22px;border-radius:4px;position:absolute;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.tl-bar:hover{filter:brightness(1.2);}
.tl-today-line{position:absolute;top:0;bottom:0;width:2px;background:rgba(240,96,96,.8);z-index:5;pointer-events:none;}
.tl-month-gl{position:absolute;top:0;bottom:0;width:1px;background:var(--border);pointer-events:none;}
.tl-month-lbl{position:absolute;font-size:10px;color:var(--muted);letter-spacing:.05em;top:50%;transform:translateY(-50%);padding-left:6px;}

/* DETAIL */
.detail-back{display:flex;align-items:center;gap:10px;cursor:pointer;color:var(--muted);font-size:12px;margin-bottom:28px;transition:color .15s;width:fit-content;}
.detail-back:hover{color:var(--text);}
.detail-title{font-family:"Playfair Display",serif;font-size:32px;font-weight:700;}
.detail-hero{margin-bottom:32px;}
.detail-hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:24px;}
.detail-stats{display:flex;gap:12px;flex-shrink:0;}
.detail-stat{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:14px 20px;text-align:center;}
.detail-stat-num{font-family:"Playfair Display",serif;font-size:28px;font-weight:700;line-height:1;}
.detail-stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:4px;}
.steps-table{width:100%;border-collapse:collapse;background:var(--s1);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.steps-table th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:12px 16px;border-bottom:1px solid var(--border);background:var(--s2);font-weight:500;}
.steps-table td{padding:12px 16px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.steps-table tr:last-child td{border-bottom:none;}
.steps-table tr:hover td{background:rgba(255,255,255,.02);}
.st-status{font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px;white-space:nowrap;}
.st-status.completed{background:rgba(62,207,142,.15);color:var(--on-track);}
.st-status.in-progress{background:rgba(74,158,255,.15);color:#4a9eff;}
.st-status.upcoming{background:rgba(167,139,250,.15);color:#a78bfa;}
.st-status.needs{background:var(--slipping-bg);color:var(--slipping);}

/* PANEL */
.side-panel{position:fixed;right:-420px;top:0;width:400px;height:100vh;background:var(--s1);border-left:1px solid var(--border2);z-index:200;transition:right .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:32px 28px;}
.side-panel.open{right:0;}
.panel-close{position:absolute;top:18px;right:18px;width:30px;height:30px;background:var(--s2);border:1px solid var(--border);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:16px;transition:all .15s;}
.panel-close:hover{color:var(--text);}
.panel-section{margin-bottom:18px;}
.panel-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px;}
.panel-value{font-size:13px;color:var(--text);line-height:1.5;}
.panel-title{font-family:"Playfair Display",serif;font-size:20px;font-weight:600;margin-bottom:20px;line-height:1.3;}
.panel-project{font-size:11px;color:var(--gold);margin-bottom:4px;letter-spacing:.05em;}
.panel-divider{height:1px;background:var(--border);margin:18px 0;}
.panel-health-block{border-radius:10px;padding:14px 16px;margin-bottom:18px;}
.panel-health-block.at-risk{background:var(--at-risk-bg);border:1px solid rgba(255,77,77,.2);}
.panel-health-block.slipping{background:var(--slipping-bg);border:1px solid rgba(245,166,35,.2);}
.panel-health-block.on-track{background:var(--on-track-bg);border:1px solid rgba(62,207,142,.2);}
.panel-health-block.ahead{background:var(--ahead-bg);border:1px solid rgba(74,158,255,.2);}
.panel-health-note{font-size:12px;color:var(--muted2);line-height:1.6;margin-top:6px;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<nav>
  <span class="nav-brand">Creative Ops</span>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showView('portfolio')">Portfolio</button>
    <button class="nav-tab" onclick="showView('status')">Health</button>
    <button class="nav-tab" onclick="showView('week')">This Week</button>
    <button class="nav-tab" onclick="showView('timeline')">Timeline</button>
    <button class="nav-tab" id="detail-tab" style="display:none" onclick="showView('detail')">← Project</button>
  </div>
  <div class="nav-right">
    <div class="health-mini" id="health-mini"></div>
    <div class="nav-today">Today <span id="today-display"></span></div>
  </div>
</nav>

<main>

<!-- PORTFOLIO -->
<div id="view-portfolio" class="view active">
  <div class="portfolio-header">
    <h2>All Projects</h2>
    <p id="portfolio-subtitle"></p>
  </div>
  <div class="portfolio-filters">
    <button class="pf-btn active" onclick="filterPortfolio('all',this)">All</button>
    <button class="pf-btn" onclick="filterPortfolio('at-risk',this)">⚠ At Risk</button>
    <button class="pf-btn" onclick="filterPortfolio('slipping',this)">↘ Slipping</button>
    <button class="pf-btn" onclick="filterPortfolio('on-track',this)">✓ On Track</button>
    <button class="pf-btn" onclick="filterPortfolio('ahead',this)">↑ Ahead</button>
  </div>
  <div class="project-grid" id="project-grid"></div>
</div>

<!-- HEALTH / STATUS -->
<div id="view-status" class="view">
  <div class="status-header">
    <h2>Project Health</h2>
    <p id="status-subtitle"></p>
  </div>
  <div class="health-summary-bar" id="health-summary-bar"></div>
  <div id="status-sections"></div>
</div>

<!-- THIS WEEK -->
<div id="view-week" class="view">
  <div class="week-header">
    <h2>This Week</h2>
    <p id="week-subtitle"></p>
  </div>
  <div id="week-content"></div>
</div>

<!-- TIMELINE -->
<div id="view-timeline" class="view">
  <div class="tl-controls">
    <span class="filter-label">Filter:</span>
    <button class="tf-btn active" onclick="setTlFilter('all',this)">All Projects</button>
    <button class="tf-btn" onclick="setTlFilter('at-risk',this)">At Risk</button>
    <button class="tf-btn" onclick="setTlFilter('slipping',this)">Slipping</button>
    <button class="tf-btn" onclick="setTlFilter('on-track',this)">On Track</button>
    <button class="tf-btn" onclick="setTlFilter('ahead',this)">Ahead</button>
  </div>
  <div class="tl-wrap"><div class="tl-inner" id="tl-inner"></div></div>
</div>

<!-- DETAIL -->
<div id="view-detail" class="view">
  <div class="detail-back" onclick="showView('portfolio')">← All Projects</div>
  <div id="detail-content"></div>
</div>

</main>

<div class="side-panel" id="side-panel">
  <div class="panel-close" onclick="closePanel()">✕</div>
  <div id="panel-content"></div>
</div>

const HEALTH_CONFIG = {
  'at-risk':  { label:'At Risk',  color:'var(--at-risk)',  bg:'var(--at-risk-bg)',  icon:'🔴', desc:'Immediate attention needed' },
  'slipping': { label:'Slipping', color:'var(--slipping)', bg:'var(--slipping-bg)', icon:'🟠', desc:'Behind pace, needs monitoring' },
  'on-track': { label:'On Track', color:'var(--on-track)', bg:'var(--on-track-bg)', icon:'🟢', desc:'Running to schedule' },
  'ahead':    { label:'Ahead',    color:'var(--ahead)',    bg:'var(--ahead-bg)',    icon:'🔵', desc:'Running ahead of schedule' },
};

const WORKFLOW_COLORS = {
  'Campaign':'#4a9eff','Campaign Wrap':'#22d3ee','Holiday Expanded':'#f472b6',
  'Strategy':'#a78bfa','Review Sprint':'#34d399','Art Partnership':'#facc15',
  'VM / Retail':'#fb923c','Digital Rollout':'#38bdf8','Event':'#f87171',
  'Partnership / Film':'#c084fc','SEO / Content Production':'#a3e635',
};
function wfColor(wf){ return WORKFLOW_COLORS[wf]||'#6e6e82'; }

function fmtDate(d){
  if(!d) return null;
  return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function fmtDateFull(d){
  if(!d) return '—';
  return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function statusClass(s){
  if(!s) return '';
  const l=s.toLowerCase();
  if(l.includes('progress')) return 'in-progress';
  if(l.includes('upcoming')) return 'upcoming';
  if(l.includes('complet')) return 'completed';
  if(l.includes('needs')) return 'needs';
  return '';
}

function buildStatus(){
  const counts={'at-risk':[],'slipping':[],'on-track':[],'ahead':[]};
  PROJECTS.forEach(p=>{ if(counts[p.health]) counts[p.health].push(p); });

  document.getElementById('status-subtitle').textContent =
    `${PROJECTS.filter(p=>p.health==='at-risk').length} at risk · ${PROJECTS.filter(p=>p.health==='slipping').length} slipping · updated ${TODAY.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;

  // Summary cards
  const bar = document.getElementById('health-summary-bar');
  bar.innerHTML = Object.entries(HEALTH_CONFIG).map(([k,v]) => `
    <div class="hsb-card ${k}" onclick="scrollToSection('${k}')">
      <div class="hsb-icon">${v.icon}</div>
      <div class="hsb-num">${counts[k].length}</div>
      <div class="hsb-label">${v.label}</div>
      <div class="hsb-sub">${v.desc}</div>
    </div>
  `).join('');

  // Sections by health tier
  const sections = document.getElementById('status-sections');
  sections.innerHTML = '';

  ['at-risk','slipping','on-track','ahead'].forEach(tier => {
    const projs = counts[tier];
    if(!projs.length) return;
    const hc = HEALTH_CONFIG[tier];
    const sec = document.createElement('div');
    sec.className='status-section';
    sec.id=`section-${tier}`;
    sec.innerHTML = `
      <div class="status-section-title">
        <span style="width:10px;height:10px;border-radius:50%;background:${hc.color};display:inline-block;"></span>
        <h3 style="color:${hc.color}">${hc.label}</h3>
        <span style="font-size:11px;color:var(--muted);font-weight:300;">${hc.desc}</span>
        <span style="margin-left:auto;font-size:11px;color:var(--muted)">${projs.length} project${projs.length>1?'s':''}</span>
      </div>
    `;

    projs.forEach(p => {
      const flaggedSteps = STEPS.filter(s=>s.project===p.name && s.health);
      const color = wfColor(p.workflow);
      const row = document.createElement('div');
      row.className='status-project-row';
      row.innerHTML = `
        <div class="spr-header" onclick="toggleSteps(this)">
          <div>
            <div class="spr-name">${p.name}</div>
            <div class="spr-workflow" style="color:${color}">${p.workflow}</div>
          </div>
          <span class="hbadge ${tier}">${hc.label}</span>
          <div class="spr-note">${p.health_note||'No notes.'}</div>
          <div class="spr-expand">
            ${flaggedSteps.length?`<span>${flaggedSteps.length} flagged step${flaggedSteps.length>1?'s':''}</span>`:''}
            <span>▾</span>
          </div>
        </div>
        <div class="spr-steps" id="steps-${p.name.replace(/\s+/g,'_')}">
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Flagged Steps</div>
          <div class="spr-steps-grid">
            ${flaggedSteps.length
              ? flaggedSteps.map(s => {
                  const shc = HEALTH_CONFIG[s.health]||{};
                  return `<div class="step-chip ${s.health}" onclick="openStepPanel(${JSON.stringify(s).replace(/"/g,'&quot;')},${JSON.stringify(p).replace(/"/g,'&quot;')})">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                      <span class="step-chip-id" style="color:${color}">${s.step_id}</span>
                      <span class="hbadge ${s.health}" style="font-size:9px;padding:1px 7px;">${shc.label||s.health}</span>
                    </div>
                    <div class="step-chip-name">${s.step_name}</div>
                    <div class="step-chip-date">${s.start?fmtDate(s.start)+(s.end&&s.end!==s.start?' → '+fmtDate(s.end):''):'TBC'}</div>
                  </div>`;
                }).join('')
              : '<div style="font-size:11px;color:var(--muted);padding:8px 0;">No specific steps flagged yet.</div>'
            }
          </div>
          <div style="margin-top:12px;">
            <span style="font-size:11px;color:var(--muted);cursor:pointer;text-decoration:underline;" onclick="openProjectDetail(${JSON.stringify(p).replace(/"/g,'&quot;')})">View all steps →</span>
          </div>
        </div>
      `;
      sec.appendChild(row);
    });
    sections.appendChild(sec);
  });
}

function toggleSteps(header){
  const stepsEl = header.nextElementSibling;
  stepsEl.classList.toggle('open');
  const arrow = header.querySelector('.spr-expand span:last-child');
  if(arrow) arrow.textContent = stepsEl.classList.contains('open') ? '▴' : '▾';
}

function scrollToSection(tier){
  const el = document.getElementById(`section-${tier}`);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

    `${THIS_WEEK.length} items across ${[...new Set(THIS_WEEK.map(i=>i.project))].length} projects`;
  const groups={};
  THIS_WEEK.forEach(item=>{ if(!groups[item.project]) groups[item.project]=[]; groups[item.project].push(item); });

    div.innerHTML=`
      <div class="week-group-title">
        <span style="width:10px;height:10px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0;"></span>

      row.addEventListener('click',()=>openStepPanel(item,p));
      div.appendChild(row);
    });
    content.appendChild(div);
  });

// ── TIMELINE ─────────────────────────────────────────────────
const TL_START=new Date('2025-08-01');
const TL_END=new Date('2027-06-01');
const TL_DAYS=(TL_END-TL_START)/86400000;
const TL_LEFT=220;
let tlFilter='all';

function dayPct(d){
  if(!d) return null;
  const dt=new Date(d+'T00:00:00');
  return ((dt-TL_START)/86400000)/TL_DAYS*100;
}

function buildTimeline(){
  const inner=document.getElementById('tl-inner');
  inner.innerHTML='';
  const filtered=tlFilter==='all'?PROJECTS:PROJECTS.filter(p=>p.health===tlFilter);
  const todPct=dayPct(TODAY.toISOString().slice(0,10));

  // Month labels row
  const mRow=document.createElement('div');
  mRow.style.cssText=`display:flex;background:var(--s2);border-bottom:1px solid var(--border);height:32px;`;
  const mLbl=document.createElement('div');
  mLbl.style.cssText=`width:${TL_LEFT}px;flex-shrink:0;border-right:1px solid var(--border);display:flex;align-items:center;padding:0 16px;font-size:10px;color:var(--muted);`;
  mLbl.textContent='Project';
  mRow.appendChild(mLbl);
  const mArea=document.createElement('div');
  mArea.style.cssText='flex:1;position:relative;';

  const months=[];
  let md=new Date(TL_START);
  while(md<=TL_END){ months.push(new Date(md)); md.setMonth(md.getMonth()+1); }
  months.forEach(m=>{
    const pct=dayPct(m.toISOString().slice(0,10));
    if(pct<0||pct>100) return;
    const sp=document.createElement('span');
    sp.className='tl-month-lbl';
    sp.style.left=pct+'%';
    sp.textContent=m.toLocaleDateString('en-US',{month:'short',year:'2-digit'});
    mArea.appendChild(sp);
    const gl=document.createElement('div');
    gl.className='tl-month-gl';
    gl.style.left=pct+'%';
    mArea.appendChild(gl);
  });

  if(todPct>=0&&todPct<=100){
    const tl=document.createElement('div');
    tl.style.cssText=`position:absolute;left:${todPct}%;top:0;bottom:0;width:2px;background:rgba(240,96,96,.7);z-index:5;`;
    mArea.appendChild(tl);
    const tlbl=document.createElement('span');
    tlbl.style.cssText=`position:absolute;left:calc(${todPct}% + 4px);top:6px;font-size:9px;color:rgba(240,96,96,.9);z-index:6;`;
    tlbl.textContent='Today';
    mArea.appendChild(tlbl);
  }
  mRow.appendChild(mArea);
  inner.appendChild(mRow);

  filtered.forEach(p=>{
    const hc=HEALTH_CONFIG[p.health]||HEALTH_CONFIG['on-track'];
    const color=hc.color;
    const row=document.createElement('div');
    row.className='tl-project-row';
    row.style.gridTemplateColumns=`${TL_LEFT}px 1fr`;
    row.innerHTML=`
      <div class="tl-label">
        <span class="hbadge ${p.health}" style="font-size:9px;padding:1px 6px;">${hc.label}</span>
        <span style="font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name}</span>
      </div>
      <div class="tl-bar-area"></div>
    `;
    const barArea=row.querySelector('.tl-bar-area');
    months.forEach(m=>{
      const pct=dayPct(m.toISOString().slice(0,10));
      if(pct<0||pct>100) return;
      const gl=document.createElement('div');
      gl.className='tl-month-gl';
      gl.style.left=pct+'%';
      barArea.appendChild(gl);
    });
    if(todPct>=0&&todPct<=100){
      const tl=document.createElement('div');
      tl.className='tl-today-line';
      tl.style.left=todPct+'%';
      barArea.appendChild(tl);
    }
    if(p.first&&p.last){
      const s=dayPct(p.first),e=dayPct(p.last),w=Math.max(e-s,0.5);
      const bar=document.createElement('div');
      bar.className='tl-bar';
      bar.style.cssText=`left:${s}%;width:${w}%;background:${color};opacity:0.8;color:rgba(0,0,0,0.85);`;
      if(w>4) bar.textContent=p.name.length>28?p.name.slice(0,28)+'…':p.name;
      bar.addEventListener('click',()=>openProjectDetail(p));
      barArea.appendChild(bar);
    }
    row.addEventListener('click',()=>openProjectDetail(p));
    inner.appendChild(row);
  });
}
function setTlFilter(f,btn){
  tlFilter=f;
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildTimeline();
}

// ── PROJECT DETAIL ────────────────────────────────────────────
function openProjectDetail(p){
  const steps=STEPS.filter(s=>s.project===p.name);
  const hc=HEALTH_CONFIG[p.health]||HEALTH_CONFIG['on-track'];
  const color=wfColor(p.workflow);
  const sc=p.status==='In Progress'?'in-progress':p.status==='Upcoming'?'upcoming':'completed';
  document.getElementById('detail-content').innerHTML=`
    <div class="detail-hero">
      <div class="detail-hero-top">
        <div>
          <div style="font-size:11px;color:${color};letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;">${p.workflow}</div>
          <div class="detail-title">${p.name}</div>
          <div style="display:flex;align-items:center;gap:12px;margin-top:10px;">
            <span class="hbadge ${p.health}">${hc.label}</span>
            <span style="font-size:11px;color:var(--muted)">${fmtDateFull(p.first)} → ${fmtDateFull(p.last)}</span>
          </div>
          ${p.health_note?`<div style="margin-top:10px;font-size:12px;color:var(--muted2);max-width:600px;line-height:1.6;padding:10px 14px;background:var(--${p.health}-bg,var(--s2));border-radius:8px;border-left:3px solid ${hc.color};">${p.health_note}</div>`:''}
        </div>
        <div class="detail-stats">
          <div class="detail-stat"><div class="detail-stat-num" style="color:var(--on-track)">${p.completed}</div><div class="detail-stat-label">Completed</div></div>
          <div class="detail-stat"><div class="detail-stat-num" style="color:#4a9eff">${p.current}</div><div class="detail-stat-label">Active</div></div>
          <div class="detail-stat"><div class="detail-stat-num" style="color:#a78bfa">${p.upcoming}</div><div class="detail-stat-label">Upcoming</div></div>
        </div>
      </div>
    </div>
    <table class="steps-table">
      <thead><tr>
        <th style="width:8%">ID</th><th style="width:28%">Step</th><th style="width:15%">Phase</th>
        <th style="width:16%">Team</th><th style="width:14%">Dates</th>
        <th style="width:10%">Status</th><th style="width:9%">Health</th>
      </tr></thead>
      <tbody>
        ${steps.map(s=>{
          const shc=HEALTH_CONFIG[s.health];
          return `<tr style="cursor:pointer;" onclick="openStepPanel(${JSON.stringify(s).replace(/"/g,'&quot;')},${JSON.stringify(p).replace(/"/g,'&quot;')})">
            <td style="color:${color};font-size:11px;font-weight:500;">${s.step_id}</td>
            <td style="color:var(--text)">${s.step_name}</td>
            <td style="color:var(--muted2);font-size:11px;">${s.phase}</td>
            <td style="color:var(--muted);font-size:11px;">${s.team||'—'}</td>
            <td style="font-size:11px;color:var(--muted2);">${s.start?fmtDate(s.start)+(s.end&&s.end!==s.start?' → '+fmtDate(s.end):''):'<span style="color:var(--slipping)">TBC</span>'}</td>
            <td><span class="st-status ${statusClass(s.status)}">${s.status||'—'}</span></td>
            <td>${shc?`<span class="hbadge ${s.health}" style="font-size:9px;padding:1px 7px;">${shc.label}</span>`:''}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
  document.getElementById('detail-tab').style.display='block';
  document.getElementById('detail-tab').textContent='← '+p.name;
  showView('detail');
}

// ── STEP PANEL ────────────────────────────────────────────────
function openStepPanel(step,project){
  const p=typeof project==='string'?JSON.parse(project):project;
  const s=typeof step==='string'?JSON.parse(step):step;
  const color=wfColor(p.workflow||'');
  const shc=HEALTH_CONFIG[s.health];
  document.getElementById('panel-content').innerHTML=`
    <div class="panel-project" style="color:${color}">${s.project||p.name}</div>
    <div class="panel-title">${s.step_name}</div>
    ${shc?`<div class="panel-health-block ${s.health}">
      <span class="hbadge ${s.health}">${shc.label}</span>
      <div class="panel-health-note">${shc.desc}</div>
    </div>`:''}
    <div class="panel-section"><div class="panel-label">Step ID</div><div class="panel-value" style="color:${color}">${s.step_id}</div></div>
    ${s.phase?`<div class="panel-section"><div class="panel-label">Phase</div><div class="panel-value">${s.phase}</div></div>`:''}
    ${s.team?`<div class="panel-section"><div class="panel-label">Team</div><div class="panel-value">${s.team}</div></div>`:''}
    <div class="panel-divider"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="panel-section"><div class="panel-label">Start</div><div class="panel-value">${s.start?fmtDateFull(s.start):'<span style="color:var(--slipping)">TBC</span>'}</div></div>
      <div class="panel-section"><div class="panel-label">End</div><div class="panel-value">${s.end?fmtDateFull(s.end):'<span style="color:var(--slipping)">TBC</span>'}</div></div>
    </div>
    <div class="panel-section"><div class="panel-label">Status</div><div class="panel-value"><span class="st-status ${statusClass(s.status)}">${s.status||'—'}</span></div></div>
    ${s.notes&&s.notes!=='—'?`<div class="panel-divider"></div><div class="panel-section"><div class="panel-label">Notes</div><div class="panel-value" style="color:var(--muted2);font-size:12px;line-height:1.7;">${s.notes}</div></div>`:''}
    ${s.date_range?`<div class="panel-section"><div class="panel-label">Date Range</div><div class="panel-value">${s.date_range}</div></div>`:''}
  `;
  document.getElementById('side-panel').classList.add('open');
}
function closePanel(){ document.getElementById('side-panel').classList.remove('open'); }

// ── VIEW SWITCHING ────────────────────────────────────────────
function showView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');
  const tab=document.querySelector(`.nav-tab[onclick*="'${v}'"]`);
  if(tab) tab.classList.add('active');
  if(v==='timeline') buildTimeline();
  if(v==='status') buildStatus();
}

// ── INIT ──────────────────────────────────────────────────────
buildHealthMini();
buildPortfolio();
buildWeek();
</script>
</body>
</html>
